[project]
name = "agent-harness"
version = "0.1.0"
description = "Streaming, tool-calling agent engine for any OpenAI-compatible endpoint."
requires-python = ">=3.12,<3.13"
dependencies = [
    "openai>=1.40",
    "httpx>=0.27",
    "pydantic>=2.0",
    "langfuse>=3.0",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_harness"]
