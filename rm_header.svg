<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" shape-rendering="crispEdges" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .panel { fill: #161b22; stroke: #30363d; stroke-width: 1; }
      .dot-r { fill: #ff5f56; }
      .dot-y { fill: #ffbd2e; }
      .dot-g { fill: #27c93f; }
      .prompt { fill: #7ee787; font-size: 16px; font-weight: 700; }
      .text { fill: #c9d1d9; font-size: 16px; }
      .muted { fill: #8b949e; font-size: 14px; }
      .accent { fill: #58a6ff; font-size: 16px; }
      .title { fill: #f0f6fc; font-size: 28px; font-weight: 700; letter-spacing: 1px; }
      .subtitle { fill: #8b949e; font-size: 13px; letter-spacing: 0.5px; }

      /* Blinking cursor */
      .cursor { fill: #7ee787; }
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      .cursor { animation: blink 1s steps(1) infinite; }

      /* Thinking dots */
      @keyframes pulse {
        0%, 80%, 100% { opacity: 0.2; }
        40% { opacity: 1; }
      }
      .think-1 { animation: pulse 1.4s infinite; }
      .think-2 { animation: pulse 1.4s infinite 0.2s; }
      .think-3 { animation: pulse 1.4s infinite 0.4s; }

      /* Pixel agent — gentle idle bob */
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-2px); }
      }
      .agent { animation: bob 2s ease-in-out infinite; transform-origin: center; }

      /* Eye blink */
      @keyframes eyeblink {
        0%, 92%, 100% { transform: scaleY(1); }
        95%           { transform: scaleY(0.1); }
      }
      .eye { animation: eyeblink 4s infinite; transform-origin: center; transform-box: fill-box; }
    </style>
  </defs>

  <!-- background -->
  <rect class="bg" width="800" height="220" rx="10"/>

  <!-- terminal panel -->
  <rect class="panel" x="20" y="20" width="760" height="180" rx="8"/>

  <!-- traffic lights -->
  <circle class="dot-r" cx="40" cy="40" r="5"/>
  <circle class="dot-y" cx="56" cy="40" r="5"/>
  <circle class="dot-g" cx="72" cy="40" r="5"/>
  <text x="400" y="44" text-anchor="middle" class="muted">local-agent — zsh</text>

  <!-- pixel agent (right side) -->
  <g class="agent" transform="translate(640, 90)">
    <!-- body (8x8 pixel grid, 6px per cell) -->
    <!-- head -->
    <rect x="12" y="0"  width="36" height="6" fill="#58a6ff"/>
    <rect x="6"  y="6"  width="48" height="6" fill="#58a6ff"/>
    <rect x="6"  y="12" width="48" height="6" fill="#79b8ff"/>
    <!-- eyes -->
    <rect class="eye" x="18" y="12" width="6" height="6" fill="#0d1117"/>
    <rect class="eye" x="36" y="12" width="6" height="6" fill="#0d1117"/>
    <!-- mouth -->
    <rect x="24" y="22" width="12" height="3" fill="#0d1117"/>
    <!-- body/neck -->
    <rect x="12" y="28" width="36" height="6" fill="#1f6feb"/>
    <rect x="6"  y="34" width="48" height="18" fill="#1f6feb"/>
    <!-- chest indicator -->
    <rect x="24" y="40" width="12" height="6" fill="#7ee787"/>
    <!-- arms -->
    <rect x="0"  y="36" width="6" height="12" fill="#1f6feb"/>
    <rect x="54" y="36" width="6" height="12" fill="#1f6feb"/>
    <!-- legs -->
    <rect x="12" y="52" width="12" height="8" fill="#388bfd"/>
    <rect x="36" y="52" width="12" height="8" fill="#388bfd"/>
  </g>

  <!-- terminal content -->
  <g transform="translate(50, 80)">
    <text class="prompt">$<tspan class="text" dx="8">uv run python -m agent</tspan></text>

    <text y="32" class="prompt">&gt;<tspan class="text" dx="8">what's the weather in tokyo?</tspan></text>

    <text y="60" class="muted">  [tool] get_weather(location="tokyo") → Tokyo: ☀️ +18°C</text>

    <text y="88" class="accent">It's a sunny 18°C in Tokyo right now<tspan class="cursor" dx="4">▊</tspan></text>
  </g>

  <!-- thinking indicator (top-right corner) -->
  <g transform="translate(720, 38)">
    <circle class="think-1" cx="0"  cy="0" r="2.5" fill="#7ee787"/>
    <circle class="think-2" cx="8"  cy="0" r="2.5" fill="#7ee787"/>
    <circle class="think-3" cx="16" cy="0" r="2.5" fill="#7ee787"/>
  </g>
</svg>